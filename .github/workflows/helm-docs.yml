name: Helm docs
on: [pull_request]
jobs:
  lint-changelog:
    name: Check all docs
    runs-on: ubuntu-latest
    container:
      image: jnorwood/helm-docs:v1.14.2
    steps:
    - name: Checkout
      uses: actions/checkout@v7.0.0
    - name: Check all charts README.md
      run: sh ci/helm-docs.sh
